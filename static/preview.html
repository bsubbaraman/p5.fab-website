<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
		<script src="/p5.fab.js" type="text/javascript"></script>
		<script src="https://unpkg.com/p5-webserial@0.1.1/build/p5.webserial.js"></script>
	</head>
	<style>
		html,
		body {
			overflow: hidden;
			margin: 0;
			overscroll-behavior: none;
			width: 100vw;
			height: 100vh;
		}

		#nav-cube-wrap {
			position: fixed;
			top: 8px;
			right: 8px;
			display: grid;
			grid-template-areas:
				'.    up   .'
				'left cube right'
				'.    down .';
			grid-template-columns: 20px 48px 20px;
			grid-template-rows: 20px 48px 20px;
			gap: 25px;
			z-index: 10;
		}

		#nav-cube-scene {
			grid-area: cube;
			perspective: 140px;
			width: 48px;
			height: 48px;
		}

		#nav-cube {
			width: 48px;
			height: 48px;
			position: relative;
			transform-style: preserve-3d;
		}

		.face {
			position: absolute;
			width: 48px;
			height: 48px;
			background: rgba(255, 255, 255, 0.82);
			border: 1px solid rgba(0, 0, 0, 0.25);
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: monospace;
			font-size: 8px;
			cursor: pointer;
			user-select: none;
			backface-visibility: hidden;
		}

		.face:hover {
			background: rgba(255, 103, 0, 0.8);
		}

		.front {
			transform: translateZ(24px);
		}
		.back {
			transform: rotateY(180deg) translateZ(24px);
		}
		.right {
			transform: rotateY(90deg) translateZ(24px);
		}
		.left {
			transform: rotateY(-90deg) translateZ(24px);
		}
		.top {
			transform: rotateX(90deg) translateZ(24px);
		}
		.bottom {
			transform: rotateX(-90deg) translateZ(24px);
		}

		.nav-arrow {
			font-size: 10px;
			padding: 0;
			background: none;
			border: none;
			cursor: pointer;
			opacity: 0.6;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.nav-arrow:hover {
			opacity: 1;
		}

		#arr-up {
			grid-area: up;
			align-self: end;
		}
		#arr-down {
			grid-area: down;
			align-self: start;
		}
		#arr-left {
			grid-area: left;
			justify-self: end;
		}
		#arr-right {
			grid-area: right;
			justify-self: start;
		}
	</style>

	<body>
		<div id="nav-cube-wrap">
			<button class="nav-arrow" id="arr-up" onclick="rotateCamera(0, PI12)">▲</button>
			<button class="nav-arrow" id="arr-left" onclick="rotateCamera(-PI12, 0)">◄</button>
			<div id="nav-cube-scene">
				<div id="nav-cube">
					<div class="face front" onclick="window.fab?.setCameraView('front')">Front</div>
					<div class="face back" onclick="window.fab?.setCameraView('back')">Back</div>
					<div class="face top" onclick="window.fab?.setCameraView('top')">Top</div>
					<div class="face bottom" onclick="window.fab?.setCameraView('bottom')">Bot</div>
					<div class="face right" onclick="window.fab?.setCameraView('side')">Right</div>
					<div class="face left" onclick="window.fab?.setCameraView('left')">Left</div>
				</div>
			</div>
			<button class="nav-arrow" id="arr-right" onclick="rotateCamera(PI12, 0)">►</button>
			<button class="nav-arrow" id="arr-down" onclick="rotateCamera(0, -PI12)">▼</button>
		</div>

		<!-- Connect modal. Lives INSIDE the sandbox iframe on purpose: navigator.serial
		     .requestPort() needs a user gesture in THIS frame, so the click must originate
		     here — a parent-page modal couldn't provide it across the sandbox origin. The
		     backdrop covers the preview pane; the card sits high in the view. -->
		<div
			id="connect-modal"
			style="display: none; position: fixed; inset: 0; z-index: 99999; background: rgba(0, 0, 0, 0.45);"
		>
			<div
				id="connect-card"
				style="position: absolute; top: 12%; left: 50%; transform: translateX(-50%); max-width: 80%; background: white; border: 2px solid black; border-radius: 8px; padding: 20px 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); text-align: center; font-family: var(--font-mono, monospace);"
			>
				<div style="font-size: 15px; margin-bottom: 14px;">Connect your printer over USB</div>
				<button
					id="connect-overlay"
					style="font-size: 17px; padding: 12px 20px; border: 2px solid black; border-radius: 6px; background: white; cursor: pointer; font-family: inherit;"
				>🔌 Connect printer</button>
				<div
					id="connect-status"
					style="margin-top: 12px; font-size: 13px; min-height: 1.1em; line-height: 1.4; color: #444;"
				></div>
			</div>
		</div>

		<script defer>
			// Origin of the parent editor, passed as a query param so we can target
			// replies precisely instead of broadcasting with '*'. Absent (=> '*') when
			// loaded same-origin by the embed route, which keeps its existing behavior.
			const PARENT_ORIGIN = new URLSearchParams(location.search).get('parentOrigin') || '*';
			addEventListener(
				'DOMContentLoaded',
				(e) => {
					window.parent.postMessage({ type: 'ready', body: '' }, PARENT_ORIGIN);
				},
				{ once: true }
			);

			window.addEventListener('message', (e) => {
				if (e.source !== window.parent) return;
				if (PARENT_ORIGIN !== '*' && e.origin !== PARENT_ORIGIN) return;
				if (e.data?.type === 'eval') {
					eval(e.data.code);
				} else if (e.data?.type === 'screenshot') {
					const canvas = document.querySelector('canvas');
					const dataURL = canvas ? canvas.toDataURL('image/jpeg', 0.8) : null;
					window.parent.postMessage({ type: 'screenshot_data', dataURL }, PARENT_ORIGIN);
				} else if (e.data?.type === 'get_gcode') {
					const gcode = typeof fab !== 'undefined' && fab ? fab.gcode : '';
					window.parent.postMessage({ type: 'gcode_data', gcode: gcode || '' }, PARENT_ORIGIN);
				} else if (e.data?.type === 'fab_command') {
					// Manual G-code from the editor info bar (positions, temps). Routed here
					// like every other parent message so it clears the PARENT_ORIGIN check —
					// the old listener in p5.fab.js checked window.location.origin, which the
					// cross-origin sandbox parent never matches.
					if (typeof fab !== 'undefined' && fab && fab.serial) {
						fab.serial.write(e.data.body.gcode + '\n');
					}
				} else if (e.data?.type === 'arm_connect') {
					armConnect();
				}
			});

			// Web Serial's requestPort() needs a user gesture in THIS frame. The parent toolbar
			// "Connect" is a gesture in the cross-origin parent and can't reach here, so it posts
			// `arm_connect`; we surface a button whose click — a real gesture in the sandbox frame —
			// calls requestPort(). Serial otherwise stays entirely owned by the sketch's fab.
			function connectEls() {
				return {
					modal: document.getElementById('connect-modal'),
					btn: document.getElementById('connect-overlay')
				};
			}
			function setConnectStatus(msg, isError) {
				const s = document.getElementById('connect-status');
				if (!s) return;
				s.textContent = msg || '';
				s.style.color = isError ? '#b00' : '#444';
			}

			// Toolbar "Connect" arms the modal. Always re-show it (never early-return on a
			// stale `connected`), reset to a clean state, and re-enable the button so the user
			// can just click again after a cancelled/failed attempt.
			let connectWired = false;
			function armConnect() {
				const { modal, btn } = connectEls();
				if (!modal || !btn) return;
				wireConnectOnce();
				btn.disabled = false;
				if (window.fab && window.fab.connected) {
					setConnectStatus('Already connected — click to reconnect or pick another port.', false);
				} else {
					setConnectStatus('');
				}
				modal.style.display = 'block';
			}

			function wireConnectOnce() {
				if (connectWired) return;
				connectWired = true;
				const { modal, btn } = connectEls();
				// Dismiss on backdrop (outside the card) click.
				modal.addEventListener('click', (e) => {
					if (e.target === modal) modal.style.display = 'none';
				});
				btn.addEventListener('click', attemptConnect);
			}

			// One set of serial listeners per attempt, removed as soon as one fires (or on the
			// next attempt) so they never stack across re-clicks. fab.serial persists across
			// sketch re-runs, so listening on window.fab.serial is stable.
			let activeConnect = null;
			function clearConnect(serial) {
				if (!activeConnect || !serial) return;
				serial.off('open', activeConnect.onOpen);
				serial.off('requesterror', activeConnect.onReqErr);
				serial.off('openerror', activeConnect.onOpenErr);
				clearTimeout(activeConnect.timer);
				activeConnect = null;
			}
			function waitForClose(serial, timeoutMs) {
				return new Promise((resolve) => {
					if (!serial.portOpen) return resolve();
					let done = false;
					const finish = () => {
						if (done) return;
						done = true;
						serial.off('close', finish);
						resolve();
					};
					serial.on('close', finish);
					setTimeout(finish, timeoutMs);
				});
			}

			async function attemptConnect() {
				const { modal, btn } = connectEls();
				const fab = window.fab;
				if (!fab || !fab.serial) {
					setConnectStatus('Sketch not ready — run your sketch, then connect.', true);
					return;
				}
				const serial = fab.serial;
				clearConnect(serial); // drop any listeners left by a prior attempt
				btn.disabled = true;

				// If a (possibly stale) port is open, close it first so we can cleanly re-open.
				if (serial.portOpen) {
					setConnectStatus('Reconnecting…', false);
					try {
						serial.close();
					} catch (e) {}
					await waitForClose(serial, 1200);
				}

				setConnectStatus('Select your printer in the browser prompt…', false);

				const done = (fn) => {
					clearConnect(serial);
					btn.disabled = false;
					if (fn) fn();
				};
				const onOpen = () =>
					done(() => {
						setConnectStatus('');
						modal.style.display = 'none';
					});
				const onReqErr = () => done(() => setConnectStatus('No port selected — click 🔌 to try again.', true));
				const onOpenErr = (detail) =>
					done(() => {
						const m = (detail && detail.message) || '';
						if (/already (open|opening)/i.test(m)) {
							setConnectStatus('That port is already connected.', false);
							modal.style.display = 'none';
						} else {
							setConnectStatus(
								'Couldn’t open that port — it may be in use by another program or browser tab. Close those, then click 🔌 to try again.',
								true
							);
						}
					});
				// Safety net: if nothing fires (e.g. picker left open), re-enable the button so
				// the user is never stuck. Doesn't remove listeners, so a late open still hides.
				const timer = setTimeout(() => {
					btn.disabled = false;
				}, 30000);

				activeConnect = { onOpen, onReqErr, onOpenErr, timer };
				serial.on('open', onOpen);
				serial.on('requesterror', onReqErr);
				serial.on('openerror', onOpenErr);
				serial.requestPort();
			}

			const PI12 = Math.PI / 12;

			function updateNavCube() {
				const cube = document.getElementById('nav-cube');
				if (cube && window.fab && window.fab.camera) {
					const cam = window.fab.camera;
					const dx = cam.eyeX - cam.centerX;
					const dy = cam.eyeY - cam.centerY;
					const dz = cam.eyeZ - cam.centerZ;
					const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
					if (len > 0) {
						// V: unit vector from scene center toward camera.
						// The cube face whose local normal equals V should face the CSS viewer.
						const vx = dx / len,
							vy = dy / len,
							vz = dz / len;

						// Use the camera's actual up vector so the cube stays consistent
						// with p5's rendering (orbitControl sets upY=-1 when past the pole).
						const ux = cam.upX || 0,
							uy = cam.upY ?? 1,
							uz = cam.upZ || 0;
						let rx = uy * vz - uz * vy;
						let ry = uz * vx - ux * vz;
						let rz = ux * vy - uy * vx;
						const rLen = Math.sqrt(rx * rx + ry * ry + rz * rz);
						if (rLen < 0.001) {
							// Up is nearly parallel to V; fall back to Z-axis
							// cross((0,0,1), V) = (-vy, vx, 0)
							rx = -vy;
							ry = vx;
							rz = 0;
							const rLen2 = Math.sqrt(rx * rx + ry * ry);
							if (rLen2 > 0) {
								rx /= rLen2;
								ry /= rLen2;
							}
						} else {
							rx /= rLen;
							ry /= rLen;
							rz /= rLen;
						}

						// Reorthogonalised up: cross(V, right)
						const wx = vy * rz - vz * ry;
						const wy = vz * rx - vx * rz;
						const wz = vx * ry - vy * rx;

						// Build the CSS matrix3d (column-major).
						// R_applied = R_axes^T, where R_axes has columns [right, up, V].
						// Columns of R_applied are the rows of R_axes:
						//   col1 = (rx, wx, vx), col2 = (ry, wy, vy), col3 = (rz, wz, vz)
						cube.style.transform = `matrix3d(${rx},${wx},${vx},0, ${ry},${wy},${vy},0, ${rz},${wz},${vz},0, 0,0,0,1)`;
					}
				}
				requestAnimationFrame(updateNavCube);
			}
			requestAnimationFrame(updateNavCube);

			function rotateCamera(deltaAz, deltaEl) {
				if (!window.fab || !window.fab.camera) return;
				const cam = window.fab.camera;
				const cx = window.fab.cameraOrientation.x;
				const cy = window.fab.cameraOrientation.y;
				const cz = window.fab.cameraOrientation.z;

				const dx = cam.eyeX - cx;
				const dy = cam.eyeY - cy;
				const dz = cam.eyeZ - cz;
				const r = Math.sqrt(dx * dx + dy * dy + dz * dz);
				const dH = Math.sqrt(dx * dx + dz * dz);

				let az = Math.atan2(dx, dz) + deltaAz;
				let el = Math.atan2(-dy, dH) + deltaEl;
				el = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, el));

				window.fab.cameraPosition.set(
					cx + r * Math.sin(az) * Math.cos(el),
					cy - r * Math.sin(el),
					cz + r * Math.cos(az) * Math.cos(el)
				);
				window.fab.recoverCameraPosition = true;
			}
		</script>
	</body>
</html>
